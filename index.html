<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny 2 Checkpoint Bot Queue Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #040811;
            background-image: 
                radial-gradient(at 0% 0%, rgba(13, 27, 42, 0.85) 0, transparent 60%),
                linear-gradient(rgba(245, 166, 35, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245, 166, 35, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 32px 32px, 32px 32px;
            background-attachment: fixed;
        }

        .mono-font { font-family: 'JetBrains Mono', monospace; }

        .destiny-panel {
            background: rgba(4, 7, 14, 0.95);
            border: 1px solid rgba(245, 166, 35, 0.2);
        }

        .tech-corners::before {
            content: ''; position: absolute; top: -1px; left: -1px; width: 12px; height: 12px;
            border-top: 3px solid rgba(245, 166, 35, 0.85); border-left: 3px solid rgba(245, 166, 35, 0.85);
        }
        
        .tech-corners::after {
            content: ''; position: absolute; bottom: -1px; right: -1px; width: 12px; height: 12px;
            border-bottom: 3px solid rgba(245, 166, 35, 0.85); border-right: 3px solid rgba(245, 166, 35, 0.85);
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        ::-webkit-scrollbar-thumb { background: rgba(245, 166, 35, 0.4); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen text-slate-200">

    <header class="border-b border-amber-500/20 bg-slate-950/95 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div>
                <h1 class="text-2xl font-bold tracking-[0.2em] text-white">TRAVELER'S CHOSEN</h1>
                <p class="text-xs text-amber-500 tracking-[0.3em] uppercase">Vanguard Terminal</p>
            </div>
            <div class="px-3 py-1 bg-amber-500/10 border border-amber-500/20 rounded-sm">
                <span class="text-[10px] font-mono tracking-widest text-amber-400 uppercase">CONSOLE // ACTIVE</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Left: Config & Activity -->
        <section class="lg:col-span-8 space-y-6">
            <div class="destiny-panel tech-corners p-6 rounded-sm">
                <label class="text-sm font-bold text-amber-500 flex items-center gap-2 uppercase mb-4">
                    <i data-lucide="user" class="w-4 h-4"></i> Guardian Identifier
                </label>
                <input type="text" id="bungiename" onkeyup="updatePreview()" placeholder="GUARDIAN#0000" class="w-full bg-black border border-slate-700 p-4 text-xl tracking-wider text-white focus:border-amber-500 outline-none transition-all">
            </div>

            <div class="destiny-panel tech-corners p-6 rounded-sm">
                <div class="flex gap-2 mb-6 border-b border-slate-800 pb-4">
                    <button id="tab-raids" onclick="changeCategory('raids')" class="px-6 py-2 bg-amber-500/20 text-amber-500 font-bold border border-amber-500 rounded-sm">Raids</button>
                    <button id="tab-dungeons" onclick="changeCategory('dungeons')" class="px-6 py-2 bg-slate-900 text-slate-400 font-bold border border-slate-700 rounded-sm hover:border-slate-500">Dungeons</button>
                </div>
                <div id="activities-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
                <div id="encounters-grid" class="grid grid-cols-2 md:grid-cols-4 gap-3 mt-6"></div>
            </div>
        </section>

        <!-- Right: Dispatch & History -->
        <section class="lg:col-span-4 space-y-6">
            <div class="destiny-panel tech-corners p-6 rounded-sm">
                <h2 class="text-xs font-bold text-slate-400 uppercase mb-4">COMMAND PREVIEW</h2>
                <div id="queueString" class="text-center text-3xl font-bold text-amber-400 mono-font py-8 bg-black rounded border border-slate-800 break-all px-4">
                    !queue
                </div>
                <button onclick="copyCommand()" class="w-full mt-4 bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded-sm uppercase tracking-widest text-lg shadow-[0_0_15px_rgba(217,119,6,0.3)] transition">
                    Copy to Clipboard
                </button>
            </div>

            <div class="destiny-panel tech-corners p-6 rounded-sm">
                <h2 class="text-xs font-bold text-amber-500 uppercase mb-4 flex items-center gap-2">
                    <i data-lucide="history" class="w-4 h-4"></i> Dispatch History
                </h2>
                <div id="history-container" class="space-y-2">
                    <p class="text-slate-600 italic text-sm">History empty.</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const ACTIVITY_DATA = {
            raids: [
                { id: "se", name: "Salvation's Edge", hasMaster: true, encounters: ["1: Substratum", "2: Dissipation", "3: Repository", "4: Verity", "5: Witness"] },
                { id: "ron", name: "Root of Nightmares", hasMaster: true, encounters: ["1: Cataclysm", "2: Scission", "3: Macrocosm", "4: Nezarec"] }
            ],
            dungeons: [
                { id: "wr", name: "Warlord's Ruin", hasMaster: true, encounters: ["1: Rathil", "2: Tempest", "3: Hefnd"] },
                { id: "gotd", name: "Ghosts of the Deep", hasMaster: true, encounters: ["1: Ritual", "2: Ecthar", "3: Simmumah"] }
            ]
        };

        let category = 'raids';
        let activity = ACTIVITY_DATA.raids[0];
        let encounter = activity.encounters[0];
        let isMaster = false;
        let history = [];

        function updatePreview() {
            const name = document.getElementById('bungiename').value || "Guardian#0000";
            const diff = isMaster ? "master" : "normal";
            const cmd = `!queue ${activity.id} ${encounter.split(':')[0]} ${isMaster ? 'm' : 'n'} ${name}`;
            document.getElementById('queueString').innerText = cmd;
        }

        function changeCategory(cat) {
            category = cat;
            activity = ACTIVITY_DATA[cat][0];
            encounter = activity.encounters[0];
            render();
            updatePreview();
        }

        function copyCommand() {
            const cmd = document.getElementById('queueString').innerText;
            navigator.clipboard.writeText(cmd);
            
            // Add to history
            if (history.length === 0 || history[0] !== cmd) {
                history.unshift(cmd);
                if (history.length > 5) history.pop();
            }
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('history-container');
            if (history.length === 0) {
                container.innerHTML = '<p class="text-slate-600 italic text-sm">History empty.</p>';
                return;
            }
            container.innerHTML = history.map(cmd => `
                <button onclick="navigator.clipboard.writeText('${cmd}')" class="w-full text-left p-3 bg-slate-900 border border-slate-800 hover:border-amber-500 transition rounded-sm mono-font text-xs text-amber-500/90 truncate">
                    ${cmd}
                </button>
            `).join('');
        }

        function render() {
            // Render Activities
            const grid = document.getElementById('activities-grid');
            grid.innerHTML = ACTIVITY_DATA[category].map(a => `
                <button onclick="selectActivity('${a.id}')" class="p-3 text-sm font-bold border ${activity.id === a.id ? 'border-amber-500 bg-amber-500/10 text-amber-500' : 'border-slate-800 text-slate-400'} rounded-sm hover:border-amber-500 transition">
                    ${a.name}
                </button>
            `).join('');
            
            // Render Encounters
            const encGrid = document.getElementById('encounters-grid');
            encGrid.innerHTML = activity.encounters.map(e => `
                <button onclick="selectEncounter('${e}')" class="p-3 text-xs font-bold border ${encounter === e ? 'border-amber-500 text-amber-500' : 'border-slate-800 text-slate-400'} rounded-sm hover:border-amber-500 transition">
                    ${e}
                </button>
            `).join('');

            // Difficulty UI
            document.getElementById('tab-raids').className = category === 'raids' ? 'px-6 py-2 bg-amber-500/20 text-amber-500 font-bold border border-amber-500 rounded-sm' : 'px-6 py-2 bg-slate-900 text-slate-400 font-bold border border-slate-700 rounded-sm';
            document.getElementById('tab-dungeons').className = category === 'dungeons' ? 'px-6 py-2 bg-amber-500/20 text-amber-500 font-bold border border-amber-500 rounded-sm' : 'px-6 py-2 bg-slate-900 text-slate-400 font-bold border border-slate-700 rounded-sm';
        }

        function selectActivity(id) {
            activity = ACTIVITY_DATA[category].find(a => a.id === id);
            encounter = activity.encounters[0];
            render();
            updatePreview();
        }

        function selectEncounter(e) {
            encounter = e;
            render();
            updatePreview();
        }

        lucide.createIcons();
        render();
        updatePreview();
    </script>
</body>
</html>
