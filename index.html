<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny 2 Checkpoint Helper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #05070a;
            color: #d1d5db;
        }

        .destiny-panel {
            background: rgba(10, 15, 25, 0.95);
            border: 1px solid rgba(245, 166, 35, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        .mono-font { font-family: 'JetBrains Mono', monospace; }
        
        .accent-text { color: #fbbf24; } /* Amber 400 */
        .high-contrast-bg { background-color: #0f172a; }
        
        button:hover { background-color: rgba(245, 166, 35, 0.2); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #040811; }
        ::-webkit-scrollbar-thumb { background: rgba(245, 166, 35, 0.5); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <header class="max-w-5xl mx-auto mb-8 border-b border-amber-500/50 pb-4">
        <h1 class="text-3xl font-bold tracking-[0.2em] text-white uppercase">Traveler's Chosen</h1>
        <p class="text-sm text-amber-500 tracking-[0.3em] uppercase mt-1">Checkpoint Management Terminal</p>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-8">
        
        <!-- Left: Configuration -->
        <div class="space-y-6">
            <div class="destiny-panel p-6 rounded-lg">
                <label class="block text-lg font-bold text-amber-500 uppercase mb-3">1. Guardian ID</label>
                <input type="text" id="bungieName" placeholder="Guardian#1234" onkeyup="updatePreview()" class="w-full bg-slate-950 border border-slate-700 text-white p-4 rounded text-xl focus:border-amber-500 outline-none transition">
            </div>

            <div class="destiny-panel p-6 rounded-lg">
                <div class="flex gap-4 mb-6">
                    <button onclick="setCategory('raids')" id="btn-raids" class="flex-1 py-3 bg-slate-800 text-white rounded font-bold hover:bg-amber-600 transition text-lg border border-transparent">Raids</button>
                    <button onclick="setCategory('dungeons')" id="btn-dungeons" class="flex-1 py-3 bg-slate-800 text-white rounded font-bold hover:bg-amber-600 transition text-lg border border-transparent">Dungeons</button>
                </div>
                <div id="selection-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <!-- Activities -->
                </div>
            </div>
        </div>

        <!-- Right: Dispatch & History -->
        <div class="space-y-6">
            <!-- Output -->
            <div class="destiny-panel p-6 rounded-lg">
                <h2 class="text-lg font-bold text-amber-500 uppercase mb-4">Command Preview</h2>
                <div id="command-preview" class="mono-font text-white bg-black/50 p-6 border border-amber-500/50 rounded text-2xl mb-4 text-center break-all">
                    !queue
                </div>
                <button onclick="copyCurrentCommand()" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-bold py-4 rounded transition uppercase tracking-widest text-lg shadow-lg">
                    Copy to Clipboard
                </button>
            </div>

            <!-- Copy History -->
            <div class="destiny-panel p-6 rounded-lg">
                <h2 class="text-lg font-bold text-amber-500 uppercase mb-4">Command History</h2>
                <div id="history-list" class="space-y-3">
                    <p class="text-slate-500 text-sm italic">No commands generated yet.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const DATA = {
            raids: [{ id: "se", name: "Salvation's Edge", encounters: ["Substratum", "Dissipation", "Repository", "Verity", "Witness"] }],
            dungeons: [{ id: "wr", name: "Warlord's Ruin", encounters: ["Rathil", "Tempest", "Hefnd"] }]
        };

        let currentCategory = 'raids';
        let selectedActivity = DATA.raids[0];
        let selectedEncounter = selectedActivity.encounters[0];
        let isMaster = false;
        let history = [];

        function updatePreview() {
            const name = document.getElementById('bungieName').value || "Guardian#0000";
            const diff = isMaster ? "master" : "normal";
            const cmd = `!queue ${selectedActivity.id} ${selectedEncounter} ${diff} ${name}`;
            document.getElementById('command-preview').innerText = cmd;
        }

        function setCategory(cat) {
            currentCategory = cat;
            selectedActivity = DATA[cat][0];
            selectedEncounter = selectedActivity.encounters[0];
            
            // UI Toggle
            document.getElementById('btn-raids').classList.toggle('bg-amber-700', cat === 'raids');
            document.getElementById('btn-dungeons').classList.toggle('bg-amber-700', cat === 'dungeons');
            
            renderSelection();
            updatePreview();
        }

        function renderSelection() {
            const grid = document.getElementById('selection-grid');
            grid.innerHTML = selectedActivity.encounters.map(e => `
                <button onclick="selectEncounter('${e}')" class="p-4 bg-slate-900 border ${selectedEncounter === e ? 'border-amber-500' : 'border-slate-700'} hover:border-amber-500 rounded text-lg text-left transition font-semibold">
                    ${e}
                </button>
            `).join('');
        }

        function selectEncounter(e) {
            selectedEncounter = e;
            renderSelection();
            updatePreview();
        }

        function copyCurrentCommand() {
            const cmd = document.getElementById('command-preview').innerText;
            navigator.clipboard.writeText(cmd);
            
            // Add to history (only if not already the most recent)
            if (history[0] !== cmd) {
                history.unshift(cmd);
                if (history.length > 5) history.pop();
                renderHistory();
            }
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.map(cmd => {
                const parts = cmd.split(' ');
                // Simple parser for !queue activity encounter difficulty name
                const display = `<span class="font-bold text-amber-500">${parts[1]}</span> | ${parts[2]} | ${parts[3]} | <span class="text-white">${parts[4]}</span>`;
                return `
                    <button onclick="navigator.clipboard.writeText('${cmd}')" class="w-full text-left p-4 bg-slate-900 hover:bg-slate-800 rounded border border-slate-700 text-sm mono-font transition">
                        ${display}
                    </button>
                `;
            }).join('');
        }

        // Initialize
        renderSelection();
        updatePreview();
    </script>
</body>
</html>
